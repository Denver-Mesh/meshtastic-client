<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- connect-src: no blanket http://* — user MQTT uses wss://*/https://*; dev uses localhost -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* ws://127.0.0.1:* http://localhost:* http://127.0.0.1:* wss://* https://* https://*.tile.openstreetmap.org https://api.github.com https://github.com; img-src 'self' data: https://*.tile.openstreetmap.org;"
    />
    <title>Mesh Client</title>
  </head>
  <body class="overflow-hidden bg-gray-900 text-gray-100">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
