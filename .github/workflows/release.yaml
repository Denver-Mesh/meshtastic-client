name: Build/Release Electron App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_script: pnpm run dist:mac:publish
          - os: ubuntu-latest
            build_script: pnpm run dist:linux:publish
          - os: windows-latest
            build_script: pnpm run dist:win:publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native dependencies
        run: pnpm run rebuild

      - name: Build and Publish
        env:
          # electron-publish reads GH_TOKEN; GITHUB_TOKEN alone is not used for uploads
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # dist:*:publish scripts run electron-builder with --publish always
        run: ${{ matrix.build_script }}

      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mesh-client-macos
          path: |
            dist/mac/*.dmg
            dist/mac/arm64/*.dmg
          retention-days: 30

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mesh-client-linux
          path: |
            dist/linux/*.AppImage
            dist/linux/*.rpm
          retention-days: 30

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mesh-client-windows
          path: dist/*.exe
          retention-days: 30
