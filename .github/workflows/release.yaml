name: Build/Release Electron App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags like v1.0.0
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_script: npm run dist:mac:publish
          - os: ubuntu-latest
            build_script: npm run dist:linux:publish
          - os: windows-latest
            build_script: npm run dist:win:publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev rpm

      - name: Install dependencies
        run: npm install

      - name: Rebuild native dependencies
        run: npm run rebuild

      - name: Build and Publish
        env:
          # electron-publish reads GH_TOKEN; GITHUB_TOKEN alone is not used for uploads
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # dist:*:publish scripts run electron-builder with --publish always
        run: ${{ matrix.build_script }}
