name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags like v1.0.0

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_script: npm run dist:mac
          - os: ubuntu-latest
            build_script: npm run dist:linux
          - os: windows-latest
            build_script: npm run dist:win

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # This will also compile the native better-sqlite3 module
        run: npm install
    
      - name: Rebuild native dependencies
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Executes the specific script for the current OS (dist:mac, dist:linux, or dist:win)
        # The -- --publish always flag tells electron-builder to upload to the repo defined in your yml
        run: ${{ matrix.build_script }} -- --publish always