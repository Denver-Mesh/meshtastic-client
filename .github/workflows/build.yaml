name: Build Binaries (no release)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_script: pnpm run dist:mac
          - os: ubuntu-latest
            build_script: pnpm run dist:linux
          - os: windows-latest
            build_script: pnpm run dist:win

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libnss3 \
            libxshmfence-dev \
            libx11-xcb1 \
            libxcb1 \
            libxext6 \
            libxfixes3 \
            libxrender1 \
            libxi6 \
            libasound2 \
            rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native dependencies
        run: pnpm run rebuild

      - name: Build
        run: ${{ matrix.build_script }}

      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: mesh-client-macos-${{ github.sha }}
          path: |
            release/mac/**/*.dmg
            release/mac/**/*.zip
            release/mac-arm64/**/*.dmg
            release/mac-arm64/**/*.zip
            release/mac-universal/**/*.dmg
            release/mac-universal/**/*.zip
            release/*.dmg
            release/*.zip
          retention-days: 30

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: mesh-client-linux-${{ github.sha }}
          path: |
            release/*.AppImage
            release/*.rpm
            release/*.deb
            release/linux-unpacked/**/*
            release/linux/**/*.AppImage
            release/linux/**/*.rpm
            release/linux/**/*.deb
          retention-days: 30

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: mesh-client-windows-${{ github.sha }}
          path: |
            release/*.exe
            release/win-unpacked/**/*
            release/win-arm64-unpacked/**/*
            release/win-x64-unpacked/**/*
          retention-days: 30
