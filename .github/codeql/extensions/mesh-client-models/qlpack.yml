# Local CodeQL model extensions (default setup picks up packs under .github/codeql/extensions).
# Barriers for mesh-client log sanitizers — see customizing-library-models-for-javascript.
name: mesh-client/mesh-client-models
version: 1.0.0
library: true
extensionTargets:
  # Match GitHub-hosted CodeQL 2.25.x+ (avoid '*' — semver may reject and skip the pack).
  codeql/javascript-all: '>=2.25.0 <5.0.0'
dataExtensions:
  - models/*.yml
