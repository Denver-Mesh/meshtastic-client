# CodeQL config for mesh-client
#
# js/http-to-file-access flags taint from HTTP reaching appendFile/writeFileSync data
# arguments. Our only sinks are formatted log lines to a fixed userData path after
# sanitizeLogPayloadForDisk; we do not persist raw network bodies or arbitrary paths.
#
# GitHub // codeql[...] suppressions do not apply here: path-problem alerts anchor on the
# data-argument sub-expression (narrow columns), while CodeQlSuppressionComment only matches
# whole-line alert locations. Excluding the query is the reliable fix when this file is used.
#
# Default CodeQL setup does not load this file; advanced setup must pass
# config-file: ./.github/codeql/codeql-config.yml to github/codeql-action/init. See
# .github/codeql/README.md.
#
# https://codeql.github.com/codeql-query-help/javascript/js-http-to-file-access/

name: mesh-client CodeQL config

query-filters:
  - exclude:
      id: js/http-to-file-access
