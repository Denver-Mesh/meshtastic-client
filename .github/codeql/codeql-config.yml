# CodeQL config for mesh-client
#
# js/http-to-file-access can flag log-service disk writes (HTTP-tainted console →
# appendLine → appendFile) because the query does not treat sanitizeLogPayloadForDisk
# as a barrier. We sanitize at the disk boundary and use inline
# `// codeql[js/http-to-file-access]` on those sinks so default/advanced runs stay
# useful without blanket query excludes. Pre-commit: log-service.contract.test.ts.

